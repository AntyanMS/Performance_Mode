# Chuwi CoreBook: Wi‑Fi и Bluetooth не отключаем на батарее (профили в 99-chuwi-active-mode.conf).
DEVICES_TO_DISABLE_ON_BAT=""
DEVICES_TO_DISABLE_ON_BAT_NOT_IN_USE=""

# USB Bluetooth (RTL8852BU и др.): без этого TLP оставляет autosuspend → после простоя/сна не ищет устройства.
USB_EXCLUDE_BTUSB=1
